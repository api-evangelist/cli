meta:
  name: Command Line Interface
  description: A curated index of services, tooling, and open source solutions for
    API command line interfaces, HTTP clients, and terminal-based API tools. This
    collection covers HTTP clients, API-specific CLIs, spec and linting CLIs, cloud
    provider CLIs, platform CLIs, and infrastructure management tools.
  tags:
  - CLI
  - Command Line Interface
  - Developer Tools
  - HTTP Client
  - Terminal
  portal: null
  github: null
  repo: cli
